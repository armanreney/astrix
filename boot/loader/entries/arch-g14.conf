title   Arch Linux (linux-g14)
linux   /vmlinuz-linux-g14
initrd  /intel-ucode.img
initrd  /initramfs-linux-g14.img

# ------------------------------------------------------------
# Storage (LUKS + Btrfs)
# ------------------------------------------------------------
# cryptdevice=UUID=...:cryptlvm:allow-discards
# root=/dev/ArchStrixVg/root
# rootflags=subvol=@
# rootfstype=btrfs rw

# ------------------------------------------------------------
# Power / CPU / Sleep
# ------------------------------------------------------------
# intel_pstate=active
# intel_iommu=on iommu=pt
# mem_sleep_default=deep
# nowatchdog
# rcutree.gp_init_delay=1

# ------------------------------------------------------------
# PCIe / NVMe
# ------------------------------------------------------------
# pcie_aspm=force
# pcie_aspm.policy=powersave
# nvme_core.default_ps_max_latency_us=5500

# ------------------------------------------------------------
# Audio Power Save
# ------------------------------------------------------------
# snd_hda_intel.power_save=1
# snd_hda_intel.power_save_controller=y

# ------------------------------------------------------------
# Intel iGPU (i915)
# ------------------------------------------------------------
# i915.enable_dc=4
# i915.enable_psr=1
# i915.enable_fbc=1
# i915.enable_guc=3
# i915.enable_dpcd_backlight=1

# ------------------------------------------------------------
# NVIDIA RTX 4060
# ------------------------------------------------------------
# nvidia-drm.modeset=1
# nvidia-drm.fbdev=1
# nvidia.NVreg_PreserveVideoMemoryAllocations=1
# nvidia.NVreg_EnableGpuFirmware=1
# nvidia.NVreg_DynamicPowerManagement=0x02
# nvidia.NVreg_EnableBacklightHandler=1

options cryptdevice=UUID={...}:cryptlvm:allow-discards root=/dev/ArchStrixVg/root zswap.enabled=0 rootflags=subvol=@ rw rootfstype=btrfs nowatchdog rcutree.gp_init_delay=1 ibt=off mem_sleep_default=deep pcie_aspm=force pcie_aspm.policy=powersave snd_hda_intel.power_save=1 intel_iommu=on iommu=pt intel_pstate=active snd_hda_intel.power_save_controller=y i915.enable_dc=4 i915.enable_psr=1 i915.enable_fbc=1 i915.enable_guc=3 i915.enable_dpcd_backlight=1 nvme_core.default_ps_max_latency_us=5500 nvidia-drm.modeset=1 nvidia-drm.fbdev=1 nvidia.NVreg_PreserveVideoMemoryAllocations=1 nvidia.NVreg_EnableGpuFirmware=1 nvidia.NVreg_DynamicPowerManagement=0x02 nvidia.NVreg_EnableBacklightHandler=1
